name: Amosclaud Real CI Failure Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Create isolated environment
        run: python -m venv .ci-venv

      - name: Install test dependencies
        run: .ci-venv/bin/python -m pip install --disable-pip-version-check pytest

      - name: Run tests
        run: .ci-venv/bin/python -m pytest
